parameters:
  SolutionBaseName: ''
  BuildConfiguration: 'Release'

jobs:
- job: CodeBuild
  pool:
    name: DAS - Continuous Integration Agents
    workspace:
      clean: all
  variables:
  - group: BUILD Management Resources

  steps:
  # GitVersion Task
  - template: azure-pipelines-templates/build/step/gitversion.yml@das-platform-building-blocks

  # App-Build Task
  - template: azure-pipelines-templates/build/step/app-build.yml@das-platform-building-blocks
    parameters:
      ContinueOnVulnerablePackageScanError: true

  # Ensure the correct .NET version and NuGet are used
  - task: UseDotNet@2
    displayName: Install .NET SDK and NuGet 5.8+
    inputs:
      packageType: sdk
      version: '6.0.x'  # Adjust to your required .NET SDK version
      includePreview: false

  - task: UseDotNet@2
    displayName: Install NuGet 5.8+
    inputs:
      packageType: nuget
      version: '5.8.0'

  # Clean output directory to avoid conflicts
  - task: PowerShell@2
    displayName: Clean Output Directory
    inputs:
      targetType: 'inline'
      script: |
        Write-Host "Cleaning output directory..."
        if (Test-Path "$(build.artifactstagingdirectory)") {
            Remove-Item -Recurse -Force "$(build.artifactstagingdirectory)"
        }

  # Restore dependencies
  - task: DotNetCoreCLI@2
    displayName: Restore Dependencies
    inputs:
      command: restore
      projects: src/SFA.DAS.FAA.Web.AcceptanceTests/SFA.DAS.FAA.Web.AcceptanceTests.csproj

  # Build acceptance tests
  - task: DotNetCoreCLI@2
    displayName: Build Acceptance Tests
    inputs:
      command: build
      projects: src/SFA.DAS.FAA.Web.AcceptanceTests/SFA.DAS.FAA.Web.AcceptanceTests.csproj
      arguments: '--configuration ${{ parameters.BuildConfiguration }} --output $(build.artifactstagingdirectory)/acceptance-tests'

  # Clean acceptance-tests directory (to avoid MSB3191 conflict)
  - task: PowerShell@2
    displayName: Clean Acceptance Tests Directory
    inputs:
      targetType: 'inline'
      script: |
        Write-Host "Cleaning acceptance-tests directory to avoid conflicts..."
        if (Test-Path "$(build.artifactstagingdirectory)/acceptance-tests") {
            Remove-Item -Recurse -Force "$(build.artifactstagingdirectory)/acceptance-tests"
        }

  # Publish acceptance tests
  - task: DotNetCoreCLI@2
    displayName: Publish Acceptance Tests
    inputs:
      command: publish
      projects: src/SFA.DAS.FAA.Web.AcceptanceTests/SFA.DAS.FAA.Web.AcceptanceTests.csproj
      arguments: '--configuration ${{ parameters.BuildConfiguration }} -o $(build.artifactstagingdirectory)/acceptance-tests/output'

  # Archive acceptance tests for deployment
  - task: ArchiveFiles@2
    displayName: Archive Acceptance Test Files
    inputs:
      rootFolderOrFile: '$(build.artifactstagingdirectory)/acceptance-tests/output'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(build.artifactstagingdirectory)/acceptance-tests/SFA.DAS.FAA.AcceptanceTests.zip'

  # Web Project Publish Task
  - task: DotNetCoreCLI@2
    displayName: Publish - dotnet publish ${{ parameters.SolutionBaseName }}
    inputs:
      command: publish
      publishWebProjects: false
      projects: src/${{ parameters.SolutionBaseName }}.Web/${{ parameters.SolutionBaseName }}.Web.csproj
      arguments: '-o $(build.artifactstagingdirectory)/publish -c ${{ parameters.BuildConfiguration }} --no-build'
      modifyOutputPath: true

  # Archive Web Project files for deployment
  - task: ArchiveFiles@2
    displayName: Archive Web Project Files
    inputs:
      rootFolderOrFile: '$(build.artifactstagingdirectory)/publish'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(build.artifactstagingdirectory)/publish/SFA.DAS.FAA.Web.zip'

  # Verify published files
  - task: PowerShell@2
    displayName: Verify Published Files
    inputs:
      targetType: 'inline'
      script: |
        Write-Host "Listing files in $(build.artifactstagingdirectory):"
        Get-ChildItem -Recurse -Path "$(build.artifactstagingdirectory)"

  # Copy Azure files to publish directory
  - task: CopyFiles@2
    displayName: Copy Files to $(build.artifactstagingdirectory)/publish
    inputs:
      Contents: |
        azure/**
      TargetFolder: $(build.artifactstagingdirectory)/publish
      OverWrite: true

  # Publish the build artifacts
  - task: PublishPipelineArtifact@1
    displayName: Publish Build Artifacts
    inputs:
      targetPath: $(build.artifactstagingdirectory)
      artifactName: ${{ parameters.SolutionBaseName }}
