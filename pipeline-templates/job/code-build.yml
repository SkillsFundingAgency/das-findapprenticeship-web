parameters:
  SolutionBaseName: ''
  BuildConfiguration: 'Release'

jobs:
- job: CodeBuild
  pool:
    name: DAS - Continuous Integration Agents
    workspace:
      clean: all
  variables:
  - group: BUILD Management Resources

  steps:
  - template: azure-pipelines-templates/build/step/gitversion.yml@das-platform-building-blocks

  - template: azure-pipelines-templates/build/step/app-build.yml@das-platform-building-blocks
    parameters:
      ContinueOnVulnerablePackageScanError: true

  # Publish Web Project with zipAfterPublish
  - task: DotNetCoreCLI@2
    displayName: Publish - dotnet publish ${{ parameters.SolutionBaseName }}
    inputs:
      command: publish
      publishWebProjects: false
      projects: src/${{ parameters.SolutionBaseName }}.Web/${{ parameters.SolutionBaseName }}.Web.csproj
      arguments: '-o $(build.artifactstagingdirectory)/publish -c ${{ parameters.BuildConfiguration }} --no-build'
      modifyOutputPath: true
      zipAfterPublish: true  # Keeps the expected SFA.DAS.FAA.Web.zip intact

  # Restore Dependencies for Acceptance Tests
  - task: DotNetCoreCLI@2
    displayName: Restore Dependencies
    inputs:
      command: restore
      projects: src/SFA.DAS.FAA.Web.AcceptanceTests/SFA.DAS.FAA.Web.AcceptanceTests.csproj

  # Build Acceptance Tests
  - task: DotNetCoreCLI@2
    displayName: Build Acceptance Tests
    inputs:
      command: build
      projects: src/SFA.DAS.FAA.Web.AcceptanceTests/SFA.DAS.FAA.Web.AcceptanceTests.csproj
      arguments: '--configuration ${{ parameters.BuildConfiguration }} --output $(build.artifactstagingdirectory)/acceptance-tests'

  # Publish Acceptance Tests
  - task: DotNetCoreCLI@2
    displayName: Publish Acceptance Tests
    inputs:
      command: publish
      projects: src/SFA.DAS.FAA.Web.AcceptanceTests/SFA.DAS.FAA.Web.AcceptanceTests.csproj
      arguments: '--configuration ${{ parameters.BuildConfiguration }} -o $(build.artifactstagingdirectory)/acceptance-tests'

  # Archive Acceptance Test Files (Optional)
  - task: ArchiveFiles@2
    displayName: Archive Acceptance Test Files
    inputs:
      rootFolderOrFile: '$(build.artifactstagingdirectory)/acceptance-tests'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(build.artifactstagingdirectory)/acceptance-tests/SFA.DAS.FAA.AcceptanceTests.zip'

  # Publish the Artifacts
  - task: PublishPipelineArtifact@1
    displayName: Publish Build Artifacts
    inputs:
      targetPath: $(build.artifactstagingdirectory)
      artifactName: ${{ parameters.SolutionBaseName }}
